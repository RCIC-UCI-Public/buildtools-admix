---
site: !include site.yaml

# Rocky 10 and above, need older versions of Java to be built for other admixes
# Prior to 10, these these were available as system-supplied packages
java_os_10:
  - java
  - java-module 

system:
  - openmpi
  - openmpi-devel
  - libX11-devel
  - autoconf
  - automake
  - libtool
  - lua-devel
  - openssl-devel
  - libuuid-devel
  - perl-Text-Balanced
  - glib2-devel
  - fuse
  - fuse-devel
  - gcc
  - gcc-c++
  - gcc-gfortran
  - !eval "'pcre2-devel' if int({{site.os_release}}) >= 10 else 'pcre-devel'"
  - zlib-devel
  - openssl-devel
  - libssh-devel
  - libcurl-devel
  - !eval "'hwloc-devel' if int({{site.os_release}}) >= 9 else ''"
  - glibc-static
  - libstdc++-static
  - "{{systemadd}}"
systemadd:
bootstrap:
  - go
  - go-module
build:
manifest:
  - "{{bootstrap}}"
  - "{{build}}"

parallel:
  sets: 3

sets:
  - base
  - centos8
  - "2023"
  - "2024"
  - "2025"
  - "2026"
