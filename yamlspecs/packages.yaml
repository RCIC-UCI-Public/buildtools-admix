---
# Rocky 10 and above, need older versions of Java to be built for other admixes
# Prior to 10, these these were available as system-supplied packages
java_os_10:
  - java
  - java-module 
system:
  - openmpi
  - openmpi-devel
  - libX11-devel
  - autoconf
  - automake
  - libtool
  - lua-devel
  - openssl-devel
  - libuuid-devel
  - perl-Text-Balanced
  - glib2-devel
  - fuse
  - fuse-devel
  - gcc
  - gcc-c++
  - gcc-gfortran
  - !OScmp ">=,10,pcre2-devel,pcre-devel"
  - zlib-devel
  - openssl-devel
  - libssh-devel
  - libcurl-devel
  - !OScmp ">=,9,hwloc-devel,"
  - glibc-static
  - libstdc++-static
  - "{{systemadd}}"
  - !OScmp ">=,10,{{systemadd10}},"
systemadd:
# Since we are building java, the following RPMs might be required to get a full
# 'reconstruction' of the Rocky 9 openjdk RPMs
# this are needed for compiling Java 11 and 17 on Rocky 10
systemadd10:
  - libXtst-devel 
  - libXt-devel
  - libXrender-devel
  - libXrandr-devel
  - libXi-devel
  - cups-devel
  - fontconfig-devel
  - alsa-lib-devel
bootstrap:
  - go
  - go-module
build:
manifest:
  - "{{bootstrap}}"
  - "{{build}}"
parallel:
  sets: 3
serialsets:
  - base
sets:
  - '{{serialsets}}' 
  - centos8
  - "2023"
  - "2024"
  - "2025"
  - "2026"
