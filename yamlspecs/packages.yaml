---
site: !include site.yaml

# Rocky 10 and above, need older versions of Java to be built for other admixes
# Prior to 10, these these were available as system-supplied packages
java_os_10:
  - java
  - java-module 

# Since we are building java, the following RPMs might be required to get a full
# 'reconstruction' of the Rocky 9 openjdk RPMs
system_10:
  - systemtap-sdt-devel
  - nss-devel
  - libXtst-devel
  - libXt-devel
  - libXrandr-devel
  - libXinerama-devel
  - libXi-devel
  - fontconfig-devel
  - desktop-file-utils
  - cups-devel
  - alsa-lib-devel

system:
  - openmpi
  - openmpi-devel
  - libX11-devel
  - autoconf
  - automake
  - libtool
  - lua-devel
  - openssl-devel
  - libuuid-devel
  - perl-Text-Balanced
  - glib2-devel
  - fuse
  - fuse-devel
  - gcc
  - gcc-c++
  - gcc-gfortran
  - !eval "'pcre2-devel' if int({{site.os_release}}) >= 10 else 'pcre-devel'"
  - zlib-devel
  - openssl-devel
  - libssh-devel
  - libcurl-devel
  - !eval "'hwloc-devel' if int({{site.os_release}}) >= 9 else ''"
  - glibc-static
  - libstdc++-static
  - !eval "'{{system_10}}' if int({{site.os_release}}) >= 10 else ''"
  - "{{systemadd}}"
  - !eval "'{{systemadd10}}' if int({{site.os_release}}) >= 10 else ''"
systemadd:
# this are needed for compiling Java 11 and 17 on Rocky 10
systemadd10:
  - libXtst-devel 
  - libXt-devel
  - libXrender-devel
  - libXrandr-devel
  - libXi-devel
  - cups-devel
  - fontconfig-devel
  - alsa-lib-devel
bootstrap:
  - go
  - go-module
build:
manifest:
  - "{{bootstrap}}"
  - "{{build}}"

parallel:
  sets: 3

sets:
  - base
  - centos8
  - "2023"
  - "2024"
  - "2025"
  - "2026"
