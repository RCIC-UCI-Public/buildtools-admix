!include packages.yaml
---
versions: versions.yaml
bootstrap:
  - gcc-module
  - tcl
  - tcl-module
build:
  - !eval "'java8-module' if int({{site.os_release}}) < 10 else ''"
  - !eval "'java11-module' if int({{site.os_release}}) < 10 else ''"
  - intel-compiler-module
  - openmpi-module
  - intel-tbb
  - intel-tbb-module
  - singularity
  - singularity-module
  - bindfs
  - tk
  - !eval "'java' if int({{site.os_release}}) >= 10 else ''"
  - !eval "'java-module' if int({{site.os_release}}) >= 10 else ''"
