!include packages.yaml
---
versions: versions.yaml
bootstrap:
  - gcc-module
  - tcl
  - tcl-module
  - bindfs
build:
  - !eval "'java8-module java11-module' if int({{site.os_release}}) < 10 else '{{java_os_10}}'"
  - intel-compiler-module
  - openmpi-module
  - !eval "'intel-tbb intel-tbb-module' if int({{site.os_release}}) < 10 else ''"
  - singularity
  - singularity-module
  - tk
