!include packages.yaml
---
versions: versions-centos8.yaml
bootstrap:
  - tcl
  - tcl-module
build:
  - !eval "'java17-module' if int({{site.os_release}}) < 10 else ''"
  - tk
  - parallel
  - parallel-module
  - intel-oneapi-module
  - singularity
  - singularity-module
  - cmake
  - cmake-module
  - !eval "'java' if int({{site.os_release}}) >= 10 else ''"
  - !eval "'java-module' if int({{site.os_release}}) >= 10 else ''"
